name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Publish as draft?"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install pyinstaller

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock

      - name: Build with PyInstaller
        run: pyinstaller GenosLauncher.spec --clean --noconfirm
        env:
          GENOS_AZURE_CLIENT_ID: ${{ secrets.GENOS_AZURE_CLIENT_ID }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc GenosLauncher.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: GenosLauncher-Windows-Installer
          path: installer_output\*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          name: GenosLauncher ${{ github.ref_name }}
          files: installer_output\GenosLauncher-*-Setup.exe
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft == 'true' }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
