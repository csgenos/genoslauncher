name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Publish as draft?"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      GENOS_WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.GENOS_WINDOWS_SIGNING_CERT_BASE64 }}
      GENOS_WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.GENOS_WINDOWS_SIGNING_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install pyinstaller

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --disable-pip -r requirements.lock

      - name: Warn if code-signing secrets are absent
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          if (-not $env:GENOS_WINDOWS_SIGNING_CERT_BASE64 -or -not $env:GENOS_WINDOWS_SIGNING_CERT_PASSWORD) {
            Write-Warning "GENOS_WINDOWS_SIGNING_CERT_BASE64 / GENOS_WINDOWS_SIGNING_CERT_PASSWORD not set — release will be unsigned. Windows SmartScreen may warn users on first run."
          }

      - name: Inject built-in client ID into source
        shell: python
        env:
          GENOS_AZURE_CLIENT_ID: ${{ secrets.GENOS_AZURE_CLIENT_ID }}
        run: |
          import os, re, sys
          client_id = os.environ.get("GENOS_AZURE_CLIENT_ID", "").strip()
          if not client_id:
              print("WARNING: GENOS_AZURE_CLIENT_ID secret is not set — "
                    "Microsoft sign-in will not work in the distributed build.")
              sys.exit(0)
          path = "src/core/auth.py"
          src  = open(path, encoding="utf-8").read()
          src  = re.sub(
              r'(_BUILTIN_CLIENT_ID\s*=\s*)"[^"]*"',
              f'\\1"{client_id}"',
              src,
          )
          open(path, "w", encoding="utf-8").write(src)
          print(f"Client ID injected ({client_id[:8]}…)")

      - name: Build with PyInstaller
        run: pyinstaller GenosLauncher.spec --clean --noconfirm

      - name: Sign application executable
        if: env.GENOS_WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "genoslauncher-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:GENOS_WINDOWS_SIGNING_CERT_BASE64))
          try {
            & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:GENOS_WINDOWS_SIGNING_CERT_PASSWORD "dist\GenosLauncher\GenosLauncher.exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for application executable." }
          } finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc GenosLauncher.iss

      - name: Sign installer
        if: env.GENOS_WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "genoslauncher-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:GENOS_WINDOWS_SIGNING_CERT_BASE64))
          try {
            Get-ChildItem "installer_output\*.exe" | ForEach-Object {
              & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:GENOS_WINDOWS_SIGNING_CERT_PASSWORD $_.FullName
              if ($LASTEXITCODE -ne 0) { throw "signtool failed for $($_.Name)." }
            }
          } finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem "installer_output\*.exe" |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ASCII "installer_output\SHA256SUMS.txt"

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: GenosLauncher-Windows-Installer
          path: |
            installer_output/*.exe
            installer_output/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          name: GenosLauncher ${{ github.ref_name }}
          files: |
            installer_output/GenosLauncher-*-Setup.exe
            installer_output/SHA256SUMS.txt
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft == 'true' }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
