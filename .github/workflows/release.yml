name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Publish as draft?"
        required: false
        default: "false"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      GENOS_WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.GENOS_WINDOWS_SIGNING_CERT_BASE64 }}
      GENOS_WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.GENOS_WINDOWS_SIGNING_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install runtime dependencies
        run: pip install -r requirements.lock

      - name: Install build dependencies
        run: pip install -r requirements-build.lock

      - name: Verify key packages importable
        run: python -c "import PySide6, cryptography, psutil; print('PySide6', PySide6.__version__)"

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --disable-pip -r requirements.lock

      - name: Run source checks
        run: |
          python -m compileall -q src
          bandit -r src -ll
          python -m unittest discover -s tests

      - name: Build with PyInstaller
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: pyinstaller GenosLauncher.spec --clean --noconfirm

      - name: Verify C-extension packages present in bundle
        shell: pwsh
        run: |
          $base = "dist\GenosLauncher\_internal"
          $required = @("PySide6", "cryptography", "psutil")
          $failed = $false
          foreach ($pkg in $required) {
            $dir = "$base\$pkg"
            if (-not (Test-Path $dir)) {
              Write-Error "MISSING from bundle: $dir"
              $failed = $true
            } else {
              $count = (Get-ChildItem $dir -Recurse).Count
              Write-Output "OK: $pkg ($count items)"
            }
          }
          if ($failed) { exit 1 }

      - name: Smoke test frozen app imports
        run: dist\GenosLauncher\GenosLauncher.exe --self-test

      - name: Sign application executable
        if: env.GENOS_WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "genoslauncher-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:GENOS_WINDOWS_SIGNING_CERT_BASE64))
          try {
            & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:GENOS_WINDOWS_SIGNING_CERT_PASSWORD "dist\GenosLauncher\GenosLauncher.exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for application executable." }
          } finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = python -c "import sys; sys.path.insert(0, 'src'); from _version import __version__; print(__version__)"
          iscc "/DAppVersion=$version" GenosLauncher.iss

      - name: Sign installer
        if: env.GENOS_WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "genoslauncher-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:GENOS_WINDOWS_SIGNING_CERT_BASE64))
          try {
            Get-ChildItem "installer_output\*.exe" | ForEach-Object {
              & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:GENOS_WINDOWS_SIGNING_CERT_PASSWORD $_.FullName
              if ($LASTEXITCODE -ne 0) { throw "signtool failed for $($_.Name)." }
            }
          } finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem "installer_output\*.exe" |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ASCII "installer_output\SHA256SUMS.txt"

      - name: Attest release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            installer_output/*.exe
            installer_output/SHA256SUMS.txt

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: GenosLauncher-Windows-Installer
          path: |
            installer_output/*.exe
            installer_output/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          name: GenosLauncher ${{ github.ref_name }}
          files: |
            installer_output/GenosLauncher-*-Setup.exe
            installer_output/SHA256SUMS.txt
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft == 'true' }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
