name: Linux Packages (AppImage + Flatpak)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Publish as draft?"
        required: false
        default: "false"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ── AppImage (x86_64) ──────────────────────────────────────────────────────
  build-appimage-x64:
    name: AppImage (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -r requirements-build.txt

      - name: Audit dependencies
        run: pip-audit --disable-pip -r requirements.lock

      - name: Run source checks
        run: |
          python -m compileall -q src
          bandit -r src -ll
          python -m unittest discover -s tests

      - name: Build with PyInstaller
        run: pyinstaller GenosLauncher.spec --clean --noconfirm

      - name: Install FUSE (required by appimagetool)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fuse libfuse2

      - name: Build AppImage
        env:
          ARCH: x86_64
        run: bash packaging/appimage/build_appimage.sh

      - name: Attest AppImage artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            GenosLauncher-*.AppImage
            GenosLauncher-*.AppImage.sha256

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: GenosLauncher-AppImage-x86_64
          path: |
            GenosLauncher-*.AppImage
            GenosLauncher-*.AppImage.sha256
          if-no-files-found: error

  # ── Flatpak ────────────────────────────────────────────────────────────────
  build-flatpak:
    name: Flatpak
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller GenosLauncher.spec --clean --noconfirm

      - name: Install flatpak + flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder appstream
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "import re, pathlib; print(re.search(r'__version__\s*=\s*[\"\'](.*?)[\"\']\s*$', pathlib.Path('src/_version.py').read_text(), re.M).group(1))")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --repo=flatpak-repo \
            --disable-rofiles-fuse \
            --disable-updates \
            flatpak-build-dir \
            packaging/flatpak/com.github.csgenos.GenosLauncher.yml

      - name: Bundle Flatpak
        run: |
          flatpak build-bundle flatpak-repo \
            "GenosLauncher-${{ steps.version.outputs.version }}-linux.flatpak" \
            com.github.csgenos.GenosLauncher

      - name: Generate SHA256 checksum
        run: |
          sha256sum "GenosLauncher-${{ steps.version.outputs.version }}-linux.flatpak" \
            > "GenosLauncher-${{ steps.version.outputs.version }}-linux.flatpak.sha256"

      - name: Attest Flatpak artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            GenosLauncher-*.flatpak
            GenosLauncher-*.flatpak.sha256

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: GenosLauncher-Flatpak
          path: |
            GenosLauncher-*.flatpak
            GenosLauncher-*.flatpak.sha256
          if-no-files-found: error

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Attach to GitHub Release
    needs: [build-appimage-x64, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets

      - name: Attach to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: ${{ github.event.inputs.draft == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
