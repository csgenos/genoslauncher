app-id: com.github.csgenos.GenosLauncher
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python312

command: genoslauncher

finish-args:
  # Display
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # Network (Modrinth, CurseForge, Microsoft auth, Minecraft downloads)
  - --share=network
  # Access to Minecraft game files in home
  - --filesystem=home
  # Keyring for credential storage
  - --socket=pcsc
  - --talk-name=org.freedesktop.secrets
  # Allow launching Minecraft processes
  - --allow=devel

modules:
  - name: python3-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation
          PySide6==6.6.0
          minecraft-launcher-lib==6.4
          requests==2.33.0
          cryptography==46.0.7
          keyring==24.0.0
          Pillow==12.2.0
          psutil==7.2.2
          certifi==2026.5.20
    sources: []

  - name: genoslauncher
    buildsystem: simple
    build-commands:
      # Install application source
      - install -d /app/lib/genoslauncher
      - cp -r src/ /app/lib/genoslauncher/
      - cp requirements.lock /app/lib/genoslauncher/
      # Entry-point wrapper
      - install -Dm755 packaging/flatpak/genoslauncher.sh /app/bin/genoslauncher
      # Desktop integration
      - install -Dm644 packaging/flatpak/com.github.csgenos.GenosLauncher.desktop
                       /app/share/applications/com.github.csgenos.GenosLauncher.desktop
      - install -Dm644 packaging/flatpak/com.github.csgenos.GenosLauncher.metainfo.xml
                       /app/share/metainfo/com.github.csgenos.GenosLauncher.metainfo.xml
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - venv
          - __pycache__
          - "*.pyc"
          - dist
          - build
          - AppDir
          - "*.AppImage"
